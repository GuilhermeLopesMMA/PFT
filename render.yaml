services:
  - type: web
    name: pavia-fight-team
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false      # definir manualmente no dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGIN
        sync: false
